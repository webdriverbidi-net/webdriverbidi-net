# Continuous integration for WebDriverBiDi.NET on pull requests and main-branch
# pushes. Release and release-time documentation deployment live in release.yml
# (tag-triggered); the two workflows share build/test jobs via _tests.yml.
#
# This file runs only for:
#   - pull_request against main
#   - push to main
#
# Tag pushes do not trigger this workflow — they trigger release.yml.

name: CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

# Cancel in-flight PR runs when a new commit is pushed to the PR branch.
# Never cancel main-branch runs in flight.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  changes:
    name: Classify changes
    runs-on: ubuntu-latest
    outputs:
      docs: ${{ steps.filter.outputs.docs }}
      benchmarks: ${{ steps.filter.outputs.benchmarks }}
    steps:
      - uses: actions/checkout@v6

      - name: Classify changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            docs:
              # Scope matches what validate-docs checks: markdown articles
              # and their C# code-sample counterparts. Library source is not
              # referenced by the validation script.
              - 'docs/articles/**'
              - 'docs/code/**'
              - 'docs/tools/validate-doc-regions.sh'
            benchmarks:
              - 'src/WebDriverBiDi/**'
              - 'test/WebDriverBiDi.Benchmarks/**'
              - 'scripts/compare-benchmarks.sh'
              - '.github/workflows/ci.yml'

  tests:
    name: Tests
    uses: ./.github/workflows/_tests.yml
    secrets: inherit

  validate-docs:
    name: Validate documentation
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate documentation code regions
        run: ./docs/tools/validate-doc-regions.sh

  benchmarks:
    name: Benchmarks
    needs: changes
    # PR-only, and only when library or benchmark sources change. Benchmarks
    # on main push or release add cost with no decision value — the merge PR
    # already ran them.
    if: |
      github.event_name == 'pull_request' &&
      needs.changes.outputs.benchmarks == 'true'
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore test/WebDriverBiDi.Benchmarks/WebDriverBiDi.Benchmarks.csproj

      - name: Run benchmarks with JSON exporter
        run: >
          dotnet run
          --project test/WebDriverBiDi.Benchmarks
          --configuration Release
          --no-restore
          --
          --filter '*'
          --exporters json

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: BenchmarkDotNet.Artifacts/
          retention-days: 30

      - name: Compare against baseline
        run: |
          set -euo pipefail
          chmod +x scripts/compare-benchmarks.sh
          scripts/compare-benchmarks.sh \
            BenchmarkDotNet.Artifacts/results \
            test/WebDriverBiDi.Benchmarks/baselines \
            > compare-output.md

      - name: Assemble PR comment body
        id: assemble
        run: |
          set -euo pipefail
          {
            echo "## Benchmark results"
            echo ""
            echo "_Advisory only. Runs on a shared GitHub-hosted runner; treat sub-20% changes as noise._"
            echo ""
            echo "Commit: \`${{ github.event.pull_request.head.sha }}\`"
            echo ""
            echo "**Legend:** ✅ no meaningful regression · ⚠️ mean +25% or allocated +10% · 🔴 mean +50% or allocated +25% · (new) no baseline entry"
            echo ""
            cat compare-output.md
            echo ""
            echo "Full artifacts (HTML/CSV/JSON/logs) are attached to this workflow run as the _benchmark-results_ artifact."
          } > benchmark-comment.md
          {
            echo "body<<__BENCHMARK_EOF__"
            cat benchmark-comment.md
            echo "__BENCHMARK_EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Find existing benchmark comment
        uses: peter-evans/find-comment@v3
        id: find-comment
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '## Benchmark results'

      - name: Post or update PR comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body: ${{ steps.assemble.outputs.body }}
          edit-mode: replace
