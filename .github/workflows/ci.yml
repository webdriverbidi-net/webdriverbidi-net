# Unified CI pipeline for WebDriverBiDi.NET.
#
# Triggers:
#   - pull_request against main: runs build, tests (unit + integration), and
#     path-gated doc-validation and benchmarks.
#   - push to main: runs build, tests, and (if paths touch docs or src) the
#     documentation build + deploy to GitHub Pages.
#   - push of a vX.Y.Z tag: runs build, tests, docs build + deploy, and the
#     NuGet release. Release is gated on unit-tests and integration-tests
#     passing via `needs:`, so a test failure prevents the package push.
#
# Notable properties:
#   - `build` runs once and uploads its output as a workflow artifact that the
#     test, docs, benchmark, and release jobs all download and reuse via
#     `--no-build`. Downstream jobs do not re-invoke dotnet build.
#   - Path-gated jobs (`validate-docs`, `build-docs`, `benchmarks`) use outputs
#     from a lightweight `changes` job that classifies the diff with
#     dorny/paths-filter. On tag pushes the filter is bypassed — everything
#     runs — so release-time behavior does not depend on what the tag commit
#     touched.
#   - On `git push --follow-tags` (commit + tag in one push) GitHub fires two
#     separate workflow runs. Both run tests; only the tag-push run runs
#     release. This is the accepted duplication; see project history for the
#     rationale.

name: CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
    tags: ['v[0-9]+.[0-9]+.[0-9]+']

# Prevent wasted work on rapid PR pushes, but never cancel a main-branch or
# tag-push run in flight — those may be publishing docs or a NuGet package.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  changes:
    name: Classify changes
    runs-on: ubuntu-latest
    outputs:
      docs: ${{ steps.filter.outputs.docs }}
      benchmarks: ${{ steps.filter.outputs.benchmarks }}
    steps:
      - uses: actions/checkout@v6

      - name: Classify changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          # On tag pushes the filter isn't meaningful — a tag is a label on an
          # existing commit. The job-level `if:` on path-gated jobs handles the
          # tag case by short-circuiting to "run everything".
          filters: |
            docs:
              - 'src/WebDriverBiDi/**'
              - 'docs/**'
            benchmarks:
              - 'src/WebDriverBiDi/**'
              - 'test/WebDriverBiDi.Benchmarks/**'
              - 'scripts/compare-benchmarks.sh'
              - '.github/workflows/ci.yml'

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          # bin/ holds compiled assemblies for every project; obj/ holds
          # intermediate build state that dotnet --no-build needs to verify
          # inputs are up to date. Both are required for downstream --no-build.
          #
          # WebDriverBiDi.AotTestApplication is deliberately excluded: it
          # accounts for ~60% of the uncompressed artifact on its own, and
          # the integration-tests job publishes it from source at test time
          # via `dotnet publish`, so the pre-built output would be discarded
          # anyway. No other downstream job consumes it.
          path: |
            **/bin/**
            **/obj/**
            !test/WebDriverBiDi.AotTestApplication/bin/**
            !test/WebDriverBiDi.AotTestApplication/obj/**
          retention-days: 1
          include-hidden-files: false

  unit-tests:
    name: Unit tests
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: build-output

      - name: Test WebDriverBiDi library (with coverage)
        # Coverage is produced only for the main library's test project. The
        # Coveralls upload globs lcov.*.info from test/coverage/ — other test
        # projects do not write coverage there.
        run: >
          dotnet test --project test/WebDriverBiDi.Tests --configuration Release --no-build --verbosity normal
          --coverlet --coverlet-output-format lcov
          --coverlet-exclude-by-file "**/_/src/**"
          --results-directory test/coverage --coverlet-file-prefix lcov

      - name: Enforce coverage thresholds
        run: ./scripts/check-lcov-thresholds.sh --min-line 90 --min-branch 90 --min-method 90 test/coverage/lcov.*.info

      - name: Test Roslyn analyzers
        run: dotnet test --project test/WebDriverBiDi.Analyzers.Tests --configuration Release --no-build --verbosity normal

      - name: Test structured logging library
        run: dotnet test --project test/WebDriverBiDi.Logging.Tests --configuration Release --no-build --verbosity normal

      - name: Upload code coverage
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          files: test/coverage/lcov.*.info

  integration-tests:
    name: Integration tests (${{ matrix.browser.display }})
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser:
          - name: firefox-nightly
            display: Firefox Nightly
            browser-type: firefox
          - name: chrome-canary
            display: Chrome Canary
            browser-type: chrome
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: build-output

      - name: Create local browser directory
        run: mkdir -p "$GITHUB_WORKSPACE/browsers"

      - name: Install Firefox Nightly
        if: matrix.browser.name == 'firefox-nightly'
        run: |
          curl -s -L -o firefox-nightly.tar.xz "https://download.mozilla.org/?product=firefox-nightly-latest-ssl&os=linux64&lang=en-US"
          tar xJf firefox-nightly.tar.xz -C "$GITHUB_WORKSPACE/browsers"

      - name: Install Chrome Canary
        if: matrix.browser.name == 'chrome-canary'
        run: |
          curl -s -L "https://googlechromelabs.github.io/chrome-for-testing/last-known-good-versions-with-downloads.json" \
            | jq '.channels["Canary"]["downloads"]["chrome"].[] | select(.platform == "linux64") | .url' \
            | xargs curl -s -L -o chrome-canary.zip
          unzip chrome-canary.zip -d "$GITHUB_WORKSPACE/browsers"
          mv "$GITHUB_WORKSPACE/browsers/chrome-linux64" "$GITHUB_WORKSPACE/browsers/chrome-canary"

      - name: Run integration tests
        run: dotnet test --project test/WebDriverBiDi.Integration.Tests --configuration Release --no-build --verbosity normal
        env:
          CI: true
          FIREFOX_EXECUTABLE: ${{ matrix.browser.browser-type == 'firefox' && format('{0}/browsers/firefox/firefox', github.workspace) || '' }}
          CHROME_EXECUTABLE: ${{ matrix.browser.browser-type == 'chrome' && format('{0}/browsers/chrome-canary/chrome', github.workspace) || '' }}

  validate-docs:
    name: Validate documentation
    needs: changes
    # Runs on PR and main push when docs or doc code samples change. On tag
    # push there's no diff to classify, so the filter's "docs" output is
    # falsy — but release-time doc correctness matters, so we force-run then.
    if: |
      needs.changes.outputs.docs == 'true' ||
      startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate documentation code regions
        run: ./docs/tools/validate-doc-regions.sh

  build-docs:
    name: Build documentation
    needs: [changes, build, validate-docs]
    # Build docs on main push when docs or library changed, and on every tag
    # push (releases always refresh the published docs). No need to build
    # docs on PR since they aren't deployed from PRs.
    if: |
      (github.event_name == 'push' && needs.changes.outputs.docs == 'true') ||
      startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: build-output

      - name: Build documentation sample code
        run: dotnet build docs/code/WebDriverBiDi.DocSnippets.csproj --configuration Release --no-restore

      - name: Install DocFX
        run: dotnet tool install -g docfx

      - name: Build documentation site
        run: |
          cd docs
          docfx metadata docfx.json
          docfx build docfx.json
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs/_site

  deploy-docs:
    name: Deploy documentation
    # Gate the Pages deploy behind tests passing so docs can never diverge
    # from a broken release or a broken main commit.
    needs: [build-docs, unit-tests, integration-tests]
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  benchmarks:
    name: Benchmarks
    needs: [changes, build]
    # PR-only, and only when library or benchmark sources change. Not run on
    # tag push: benchmarks at release time are pure cost with no decision
    # value — the merge PR for a release candidate already ran them.
    if: |
      github.event_name == 'pull_request' &&
      needs.changes.outputs.benchmarks == 'true'
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: build-output

      - name: Run benchmarks with JSON exporter
        run: >
          dotnet run
          --project test/WebDriverBiDi.Benchmarks
          --configuration Release
          --no-build
          --
          --exporters json

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: BenchmarkDotNet.Artifacts/
          retention-days: 30

      - name: Compare against baseline
        run: |
          set -euo pipefail
          chmod +x scripts/compare-benchmarks.sh
          scripts/compare-benchmarks.sh \
            BenchmarkDotNet.Artifacts/results \
            test/WebDriverBiDi.Benchmarks/baselines \
            > compare-output.md

      - name: Assemble PR comment body
        id: assemble
        run: |
          set -euo pipefail
          {
            echo "## Benchmark results"
            echo ""
            echo "_Advisory only. Runs on a shared GitHub-hosted runner; treat sub-20% changes as noise._"
            echo ""
            echo "Commit: \`${{ github.event.pull_request.head.sha }}\`"
            echo ""
            echo "**Legend:** ✅ no meaningful regression · ⚠️ mean +25% or allocated +10% · 🔴 mean +50% or allocated +25% · (new) no baseline entry"
            echo ""
            cat compare-output.md
            echo ""
            echo "Full artifacts (HTML/CSV/JSON/logs) are attached to this workflow run as the _benchmark-results_ artifact."
          } > benchmark-comment.md
          {
            echo "body<<__BENCHMARK_EOF__"
            cat benchmark-comment.md
            echo "__BENCHMARK_EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Find existing benchmark comment
        uses: peter-evans/find-comment@v3
        id: find-comment
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '## Benchmark results'

      - name: Post or update PR comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body: ${{ steps.assemble.outputs.body }}
          edit-mode: replace

  release:
    name: Release
    needs: [build, unit-tests, integration-tests]
    # Tag-push only. The `needs:` relationships guarantee tests passed on
    # this exact SHA before the release job starts — replaces the poll-by-
    # workflow-name mechanism of the old release.yml.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Verify tag is on origin/main
        run: |
          git fetch --no-tags --prune --depth=1 origin +refs/heads/*:refs/remotes/origin/*
          git branch --remote --contains | grep origin/main

      - name: Set VERSION variable from tag
        run: echo "VERSION=${GITHUB_REF/refs\/tags\/v/}" >> "$GITHUB_ENV"

      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: build-output

      - name: Pack releasable packages
        # `dotnet pack` on the solution packs only projects with
        # IsPackable=true, which is exactly WebDriverBiDi, WebDriverBiDi.Analyzers,
        # and WebDriverBiDi.Logging. Symbol-package emission is configured
        # per-project in the csproj files (only library and logging produce
        # .snupkg; the analyzer does not have a managed assembly to symbolicate).
        run: dotnet pack WebDriverBiDi.NET.sln --configuration Release -p:Version="${VERSION}" --no-build --output .

      - name: Push packages to NuGet
        run: dotnet nuget push "*.nupkg" --source https://api.nuget.org/v3/index.json --api-key "${NUGET_API_KEY}"
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
