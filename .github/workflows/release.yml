name: Release
on:
  push:
    tags:
    - "v[0-9]+.[0-9]+.[0-9]+"
jobs:
  # Build and publish release packages (skip tests since they passed on main)
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: |
          8.0.x
          9.0.x
          10.0.x

    - name: Verify commit exists in origin/main
      run: |
        git fetch --no-tags --prune --depth=1 origin +refs/heads/*:refs/remotes/origin/*
        git branch --remote --contains | grep origin/main

    - name: Wait for CI and Integration Tests to pass for this commit
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        COMMIT_SHA: ${{ github.sha }}
        POLL_INTERVAL_SECONDS: "30"
        POLL_TIMEOUT_SECONDS: "2700"  # 45 minutes
      run: |
        # Poll a workflow run for COMMIT_SHA until it reaches a terminal status.
        # Fails if the run ultimately concludes with anything other than "success"
        # or if POLL_TIMEOUT_SECONDS elapses before the run appears/completes.
        wait_for_workflow() {
          local workflow_name="$1"
          local deadline=$(( $(date +%s) + POLL_TIMEOUT_SECONDS ))

          echo "⏳ Waiting for workflow '$workflow_name' on commit $COMMIT_SHA..."
          while true; do
            local run_json
            run_json=$(gh run list \
              --commit "$COMMIT_SHA" \
              --workflow "$workflow_name" \
              --json databaseId,status,conclusion \
              --jq '.[0]')

            if [ -z "$run_json" ] || [ "$run_json" = "null" ]; then
              echo "  (no run found yet for '$workflow_name', retrying...)"
            else
              local status conclusion run_id
              status=$(echo "$run_json" | jq -r '.status')
              conclusion=$(echo "$run_json" | jq -r '.conclusion')
              run_id=$(echo "$run_json" | jq -r '.databaseId')

              if [ "$status" = "completed" ]; then
                echo "  run $run_id completed with conclusion: $conclusion"
                if [ "$conclusion" = "success" ]; then
                  echo "✅ '$workflow_name' passed"
                  return 0
                else
                  echo "❌ '$workflow_name' did not pass. Conclusion: $conclusion"
                  return 1
                fi
              fi
              echo "  run $run_id status: $status (waiting...)"
            fi

            if [ "$(date +%s)" -ge "$deadline" ]; then
              echo "❌ Timed out waiting for workflow '$workflow_name' after ${POLL_TIMEOUT_SECONDS}s"
              return 1
            fi
            sleep "$POLL_INTERVAL_SECONDS"
          done
        }

        wait_for_workflow ".NET"
        wait_for_workflow "Integration Tests"

    - name: Set VERSION variable from tag
      run: echo "VERSION=${GITHUB_REF/refs\/tags\/v/}" >> $GITHUB_ENV

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Release -p:Version=${VERSION} --no-restore

    - name: Pack library package
      run: dotnet pack src/WebDriverBiDi --configuration Release -p:Version=${VERSION} --no-build -p:IncludeSymbols=true -p:SymbolPackageFormat=snupkg --output .

    - name: Pack analyzer package
      run: dotnet pack src/WebDriverBiDi.Analyzers --configuration Release -p:Version=${VERSION} --no-build --output .

    - name: Pack structured logging package
      run: dotnet pack src/WebDriverBiDi.Logging --configuration Release -p:Version=${VERSION} --no-build -p:IncludeSymbols=true -p:SymbolPackageFormat=snupkg --output .

    - name: Push library package
      run: dotnet nuget push WebDriverBiDi.${VERSION}.nupkg --source https://api.nuget.org/v3/index.json --api-key ${NUGET_API_KEY}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

    - name: Push analyzer package
      run: dotnet nuget push WebDriverBiDi.Analyzers.${VERSION}.nupkg --source https://api.nuget.org/v3/index.json --api-key ${NUGET_API_KEY}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

    - name: Push structured logging package
      run: dotnet nuget push WebDriverBiDi.Logging.${VERSION}.nupkg --source https://api.nuget.org/v3/index.json --api-key ${NUGET_API_KEY}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
