# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: |
          8.0.x
          9.0.x
          10.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore

    - name: Test Library
      run: dotnet test --project test/WebDriverBiDi.Tests --no-build --verbosity normal --coverlet --coverlet-output-format lcov --coverlet-exclude-by-file "**/_/src/**" --results-directory ../test/coverage --coverlet-file-prefix lcov

    - name: Enforce coverage thresholds
      run: ./scripts/check-lcov-thresholds.sh --min-line 90 --min-branch 90 --min-method 90 test/coverage/lcov.*.info

    - name: Test Roslyn Analyzers
      run: dotnet test --project test/WebDriverBiDi.Analyzers.Tests --no-build --verbosity normal

    - name: Test Structured Logging Library
      run: dotnet test --project test/WebDriverBiDi.Logging.Tests --no-build --verbosity normal

    - name: Upload code coverage
      uses: coverallsapp/github-action@v2
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        files: ../test/coverage/lcov.*.info
